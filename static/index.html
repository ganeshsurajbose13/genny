<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Trading Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:#e5e7eb;
    margin:0;
    padding:14px;
}

h1{color:#38bdf8}

input,button{
    padding:10px;
    border-radius:6px;
    border:none;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.card{
    background:#020617;
    padding:14px;
    border-radius:10px;
    margin-bottom:14px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:12px;
}

.badge{
    padding:5px 10px;
    border-radius:6px;
    font-weight:bold;

.buy{background:#16a34a}
.sell{background:#dc2626}

    width:100%;

    padding:6px;

    font-size:22px;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>🚀 AI Trading Dashboard</h1>

<div class="card">
    <input id="symbol" placeholder="RELIANCE">
    <button onclick="analyze()">Analyze</button>
    <button onclick="loadScanner()">Scanner</button>
</div>

<div id="result"></div>

<script>
const API = "";

/* ---------- helpers ---------- */
function safe(v){
    if(v === undefined || v === null) return "-";
    return Number(v).toFixed(2);
}

function badgeCls(s){
    if(!s) return "hold";
    s = s.toUpperCase();
    if(s.includes("BUY")) return "buy";
    if(s.includes("SELL")) return "sell";
    return "hold";
}

/* ---------- ENTER ---------- */
document.getElementById("symbol").addEventListener("keypress", e=>{
    if(e.key === "Enter") analyze();
});

/* ---------- ANALYZE ---------- */
async function analyze(sym){

    let symbol = (sym || document.getElementById("symbol").value).trim().toUpperCase();

    if(!symbol){
        alert("Enter symbol");
        return;
    }

    if(!symbol.includes(".")) symbol += ".NS";

    try{
        const res = await fetch(`${API}/analyze?symbol=${symbol}`);
        const d = await res.json();

        if(d.error){
            alert(d.error);
            return;
        }

        render(d);

    }catch(e){
        console.error(e);
        alert("Server not responding");
    }
}

/* ---------- RENDER ---------- */
function render(d){

    const rr = (d.risk?.target && d.risk?.stop_loss)
        ? ((d.risk.target - d.price) / (d.price - d.risk.stop_loss)).toFixed(2)
        : "-";

    let html = `
    <div class="card">
        <h2>${d.symbol}</h2>
        <div class="big">${safe(d.price)}</div>
        <span class="badge ${badgeCls(d.signal)}">${d.signal}</span>
    </div>

    <div class="grid">

        <div class="card">
            <h3>📊 Overview</h3>
            <table>
                <tr><td>Score</td><td>${safe(d.score)}</td></tr>
                <tr><td>RSI</td><td>${safe(d.rsi)}</td></tr>
                <tr><td>AI Probability</td><td>${safe(d.ml_probability)}%</td></tr>
            </table>
        </div>

        <div class="card">
            <h3>⚡ Signals</h3>
            <table>
                <tr><td>MACD</td><td>${d.macd}</td></tr>
                <tr><td>VWAP</td><td>${d.vwap}</td></tr>
                <tr><td>Breakout</td><td>${d.breakout}</td></tr>
                <tr><td>Volume</td><td>${d.volume_strong ? "STRONG" : "WEAK"}</td></tr>
            </table>
        </div>

        <div class="card">
            <h3>⏱ Timeframes</h3>
            <table>
                <tr><td>1H</td><td>${d.timeframes?.["1H"] || "-"}</td></tr>
                <tr><td>4H</td><td>${d.timeframes?.["4H"] || "-"}</td></tr>
                <tr><td>Daily</td><td>${d.timeframes?.["DAILY"] || "-"}</td></tr>
                <tr><td>Weekly</td><td>${d.timeframes?.["WEEKLY"] || "-"}</td></tr>
                <tr><td>Monthly</td><td>${d.timeframes?.["MONTHLY"] || "-"}</td></tr>
            </table>
        </div>

        <div class="card">
            <h3>🎯 Risk</h3>
            <table>
                <tr><td>Stop Loss</td><td>${safe(d.risk?.stop_loss)}</td></tr>
                <tr><td>Target</td><td>${safe(d.risk?.target)}</td></tr>
                <tr><td>R:R</td><td>${rr}</td></tr>
            </table>
        </div>

    </div>

    <div class="card">
        <h3>📈 Live Chart</h3>
        <iframe 
            src="https://s.tradingview.com/widgetembed/?symbol=${d.symbol}&interval=D&theme=dark"
            width="100%" height="400" frameborder="0">
        </iframe>
    </div>
    `;

    document.getElementById("result").innerHTML = html;
}

/* ---------- SCANNER ---------- */
async function loadScanner(){
    try{
        const res = await fetch(`${API}/scanner`);
        const data = await res.json();

        let html = `<div class="grid">`;

        [...data.TOP_BUY, ...data.TOP_SELL].forEach(x=>{
            html += `
            <div class="card">
                <h3>${x.symbol}</h3>
                <span class="badge ${badgeCls(x.signal)}">${x.signal}</span>
                <p>Score: ${safe(x.score)}</p>
                <button onclick="analyze('${x.symbol}')">Analyze</button>
            </div>`;
        });

        html += "</div>";

        document.getElementById("result").innerHTML = html;

    }catch(e){
        alert("Scanner Error");
    }
}
</script>

</body>
</html>
</body>
</html>
