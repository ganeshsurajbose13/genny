<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Trading Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:#e5e7eb;
    margin:0;
    padding:16px;
}

h1{
    color:#38bdf8;
    margin-bottom:20px;
}

input, button{
    padding:10px;
    border:none;
    border-radius:8px;
    font-size:14px;
}

input{
    width:220px;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
    margin-left:6px;
}

button:hover{
    background:#1d4ed8;
}

.card{
    background:#020617;
    border-radius:12px;
    padding:16px;
    margin-bottom:16px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:14px;
}

.badge{
    padding:6px 12px;
    border-radius:8px;
    font-weight:bold;
    display:inline-block;
    margin-top:10px;
}

.buy{
    background:#16a34a;
}

.sell{
    background:#dc2626;
}

.hold{
    background:#64748b;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    padding:8px;
    border-bottom:1px solid #1e293b;
    font-size:14px;
}

.big{
    font-size:28px;
    font-weight:bold;
    margin-top:8px;
}

.section-title{
    margin-top:10px;
    margin-bottom:10px;
    color:#38bdf8;
}
</style>
</head>

<body>

<h1>🚀 AI Trading Dashboard</h1>

<div class="card">
    <input id="symbol" placeholder="Enter Symbol (RELIANCE)">
    <button onclick="analyze()">Analyze</button>
    <button onclick="loadScanner()">Scanner</button>
    <button onclick="loadIndexes()">Indexes</button>
</div>

<div id="result"></div>

<script>

const API = "";


/* =====================================================
HELPERS
===================================================== */

function safe(v){
    if(v === undefined || v === null) return "-";
    let n = Number(v);
    return isNaN(n) ? "-" : n.toFixed(2);
}

function badgeCls(signal){
    if(!signal) return "hold";

    signal = signal.toUpperCase();

    if(signal.includes("BUY") || signal.includes("BULLISH")){
        return "buy";
    }

    if(signal.includes("SELL") || signal.includes("BEARISH")){
        return "sell";
    }

    return "hold";
}

document.getElementById("symbol").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        analyze();
    }
});


/* =====================================================
ANALYZE
===================================================== */

async function analyze(customSymbol){

    let symbol = customSymbol || document.getElementById("symbol").value.trim().toUpperCase();

    if(!symbol){
        alert("Please enter stock symbol");
        return;
    }

    if(!symbol.includes(".") && !symbol.startsWith("^")){
        symbol += ".NS";
    }

    try{
        const res = await fetch(`${API}/analyze?symbol=${symbol}`);
        const d = await res.json();

        if(d.error){
            alert(d.error);
            return;
        }

        renderAnalyze(d);

    }catch(err){
        console.error(err);
        alert("Server Error");
    }
}


/* =====================================================
RENDER ANALYZE
===================================================== */

function renderAnalyze(d){

    let html = `

    <div class="card">
        <h2>${d.symbol}</h2>
        <div class="big">₹ ${safe(d.price)}</div>
        <span class="badge ${badgeCls(d.signal)}">${d.signal}</span>
    </div>

    <div class="grid">

        <div class="card">
            <h3 class="section-title">📊 Overview</h3>
            <table>
                <tr><td>Score</td><td>${safe(d.score)}</td></tr>
                <tr><td>RSI</td><td>${safe(d.rsi)}</td></tr>
                <tr><td>ML Probability</td><td>${safe(d.ml_probability)}%</td></tr>
            </table>
        </div>

        <div class="card">
            <h3 class="section-title">⚡ Technical Signals</h3>
            <table>
                <tr><td>MACD</td><td>${d.macd}</td></tr>
                <tr><td>VWAP</td><td>${d.vwap}</td></tr>
                <tr><td>Breakout</td><td>${d.breakout}</td></tr>
                <tr><td>Volume</td><td>${d.volume_strong ? "STRONG" : "WEAK"}</td></tr>
            </table>
        </div>

        <div class="card">
            <h3 class="section-title">⏱ Timeframes</h3>
            <table>
                <tr><td>1H</td><td>${d.timeframes?.["1H"] || "-"}</td></tr>
                <tr><td>4H</td><td>${d.timeframes?.["4H"] || "-"}</td></tr>
                <tr><td>Daily</td><td>${d.timeframes?.["DAILY"] || "-"}</td></tr>
                <tr><td>Weekly</td><td>${d.timeframes?.["WEEKLY"] || "-"}</td></tr>
                <tr><td>Monthly</td><td>${d.timeframes?.["MONTHLY"] || "-"}</td></tr>
            </table>
        </div>

        <div class="card">
            <h3 class="section-title">🎯 Risk Management</h3>
            <table>
                <tr><td>Stop Loss (Small)</td><td>${safe(d.risk?.stop_loss_small)}</td></tr>
                <tr><td>Stop Loss (Big)</td><td>${safe(d.risk?.stop_loss_big)}</td></tr>
                <tr><td>Target (Small)</td><td>${safe(d.risk?.target_small)}</td></tr>
                <tr><td>Target (Big)</td><td>${safe(d.risk?.target_big)}</td></tr>
            </table>
        </div>

    </div>

    <div class="card">
        <h3 class="section-title">📈 Live TradingView Chart</h3>
        <iframe
            src="https://s.tradingview.com/widgetembed/?symbol=${d.symbol}&interval=D&theme=dark"
            width="100%"
            height="420"
            frameborder="0">
        </iframe>
    </div>
    `;

    document.getElementById("result").innerHTML = html;
}


/* =====================================================
SCANNER
===================================================== */

async function loadScanner(){

    try{
        const res = await fetch(`${API}/scanner`);
        const data = await res.json();

        let html = `<h2>🔥 Top Scanner Results</h2><div class="grid">`;

        [...data.TOP_BUY, ...data.TOP_SELL].forEach(x => {
            html += `
            <div class="card">
                <h3>${x.symbol}</h3>
                <span class="badge ${badgeCls(x.signal)}">${x.signal}</span>

                <table style="margin-top:12px;">
                    <tr><td>Score</td><td>${safe(x.score)}</td></tr>
                    <tr><td>RSI</td><td>${safe(x.rsi)}</td></tr>
                    <tr><td>Breakout</td><td>${x.breakout || "-"}</td></tr>
                </table>

                <br>
                <button onclick="analyze('${x.symbol}')">
                    Full Analysis
                </button>
            </div>
            `;
        });

        html += `</div>`;

        document.getElementById("result").innerHTML = html;

    }catch(err){
        console.error(err);
        alert("Scanner Error");
    }
}


/* =====================================================
INDEX SCANNER
===================================================== */

async function loadIndexes(){

    try{
        const res = await fetch(`${API}/index-scanner`);
        const data = await res.json();

        let html = `
        <div class="card">
            <h2>📌 Market Index Scanner</h2>
            <table>
                <tr>
                    <td><b>Index</b></td>
                    <td><b>Price</b></td>
                    <td><b>RSI</b></td>
                    <td><b>Signal</b></td>
                    <td><b>Breakout</b></td>
                </tr>
        `;

        data.forEach(x => {
            html += `
                <tr>
                    <td>${x.index}</td>
                    <td>${safe(x.price)}</td>
                    <td>${safe(x.rsi)}</td>
                    <td>
                        <span class="badge ${badgeCls(x.signal)}">
                            ${x.signal}
                        </span>
                    </td>
                    <td>${x.breakout || "-"}</td>
                </tr>
            `;
        });

        html += `
            </table>
        </div>
        `;

        document.getElementById("result").innerHTML = html;

    }catch(err){
        console.error(err);
        alert("Index Scanner Error");
    }
}

</script>

</body>
</html>
